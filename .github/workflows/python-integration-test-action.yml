name: Python Client Integration Test Action

# run python client integration test
on:
  workflow_call:
    inputs:
      architecture:
        required: true
        description: 'Architecture of the platform'
        type: string
      java-version:
        required: true
        description: 'Java version'
        type: string

jobs:
  start-runner:
    name: JDK${{ inputs.java-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLATFORM: ${{ inputs.architecture }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Free up disk space
        run: |
          dev/ci/util_free_space.sh

      - name: Python Client Integration Test
        id: integrationTest
        run: |
          ./gradlew compileDistribution -PskipWeb=true -x test

          for pythonVersion in "3.10" "3.11" "3.12"
          do
            echo "Use Python version ${pythonVersion} to test the Python client."
            ./gradlew -PpythonVersion=${pythonVersion} -PskipDockerTests=false -PskipWeb=true :clients:client-python:test
            # Clean Gravitino database to clean test data
            rm -rf ./distribution/package/data
          done

      - name: Upload integrate tests reports
        uses: actions/upload-artifact@v7
        if: ${{ failure() && steps.integrationTest.outcome == 'failure' }}
        with:
          name: integrate test reports
          path: |
            build/reports
            integration-test/build/integration-test.log
            distribution/package/logs/gravitino-server.out
            distribution/package/logs/gravitino-server.log
            catalogs/**/*.log
            catalogs/**/*.tar
