name: Chart Test Action

# lint/install helm charts
on:
  workflow_call:
    inputs:
      java-version:
        required: true
        description: 'Java version'
        type: string
      target-branch:
        required: false
        description: 'Target branch for chart-testing diff (PR only)'
        type: string
        default: ''
      run-all-charts:
        required: false
        description: 'Run chart tests without list-changed (for schedule)'
        type: boolean
        default: false

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f

      - name: Determine charts to test
        id: list-changed
        run: |
          TARGET_BRANCH="${{ inputs.target-branch }}"
          if [[ -z "$TARGET_BRANCH" ]]; then
            TARGET_BRANCH="${{ github.event.repository.default_branch }}"
          fi
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> "$GITHUB_ENV"

          if [[ "${{ inputs.run-all-charts }}" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(ct list-changed --chart-dirs=dev/charts --target-branch "$TARGET_BRANCH")
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          ct lint --chart-dirs=dev/charts --chart-yaml-schema=dev/ci/chart_schema.yaml --lint-conf=dev/ci/lintconf.yaml --target-branch $TARGET_BRANCH --check-version-increment=false

      - name: Set up kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: container-tools/kind-action@v2
        with:
          version: v0.27.0
          cluster_name: helm-test-cluster
          registry: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Extract Image Tag
        id: get-tag
        run: |
          # Use yq to parse the value. Path typically follows .image.tag structure.
          IMAGE_TAG=$(yq '.image.tag' dev/charts/gravitino/values.yaml)

          # Remove any potential quotes and save to GitHub Outputs
          echo "tag=$(echo $IMAGE_TAG | tr -d '\"')" >> "$GITHUB_ENV"

      - name: Build the Docker image to local registry
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker buildx use default
          rm -rf ${{ github.workspace }}/README.md
          rm -rf ${{ github.workspace }}/etc
          rm -rf ${{ github.workspace }}/dev/charts/gravitino/Chart.lock
          for t in gravitino:gravitino iceberg-rest-server:gravitino-iceberg-rest lance-rest-server:gravitino-lance-rest; do
            (
            REPO_NAME=${t#*:}
            FOLDER_NAME=${t%:*}
            CONTEXT_DIR="${{ github.workspace }}/dev/docker/${FOLDER_NAME}/"
            . ${CONTEXT_DIR}/${FOLDER_NAME}-dependency.sh
            docker build -t ${KIND_REGISTRY}/${REPO_NAME}:${tag} "${CONTEXT_DIR}"
            docker push ${KIND_REGISTRY}/${REPO_NAME}:${tag}
            )
          done

      - name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b

      - name: Run chart-testing (install default,gravitino)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --charts dev/charts/gravitino --target-branch $TARGET_BRANCH --helm-extra-set-args "--set image.registry=\"\" --set image.repository=${KIND_REGISTRY}/gravitino"

      - name: Run chart-testing (install default,gravitino-iceberg-rest-server)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --charts dev/charts/gravitino-iceberg-rest-server --target-branch $TARGET_BRANCH --helm-extra-set-args "--set image.registry=\"\" --set image.repository=${KIND_REGISTRY}/gravitino-iceberg-rest"

      - name: Run chart-testing (install gravitino with mysql enable,replicas 2)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --charts=dev/charts/gravitino --helm-extra-set-args "--values dev/charts/gravitino/resources/scenarios/ci-values.yaml --set image.registry=\"\" --set image.repository=${KIND_REGISTRY}/gravitino" --target-branch $TARGET_BRANCH

      - name: Run chart-testing (install gravitino with postgresql enable)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --charts=dev/charts/gravitino --helm-extra-set-args "--values dev/charts/gravitino/resources/scenarios/pg-values.yaml --set image.registry=\"\" --set image.repository=${KIND_REGISTRY}/gravitino" --target-branch $TARGET_BRANCH

      - name: Run chart-testing (install default,gravitino-lance-rest-server)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm install gravitino dev/charts/gravitino -n test --create-namespace --set image.registry="" --set image.repository=${KIND_REGISTRY}/gravitino --wait --timeout 5m
          kubectl run -n test --rm -i --restart=Never --image=curlimages/curl:latest metalake-setup \
          --command -- curl -X POST \
          -H "Content-Type: application/json" \
          -H "Accept: application/vnd.gravitino.v1+json" \
          -d '{"name":"lrs_test","comment":"Quick setup"}' \
          http://gravitino.test:8090/api/metalakes
          ct install --charts dev/charts/gravitino-lance-rest-server --target-branch $TARGET_BRANCH --helm-extra-set-args "--set image.registry=\"\" --set image.repository=${KIND_REGISTRY}/gravitino-lance-rest --set lanceRest.gravitinoUri=http://gravitino.test:8090 --set lanceRest.gravitinoMetalake=lrs_test"
