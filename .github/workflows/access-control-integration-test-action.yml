name: Access Control Integration Test Action

# run authorization integration test
on:
  workflow_call:
    inputs:
      architecture:
        required: true
        description: 'Architecture of the platform'
        type: string
      java-version:
        required: true
        description: 'Java version'
        type: string
      test-mode:
        required: true
        description: 'Run on embedded or deploy mode'
        type: string
      jdbc-backend:
        required: true
        description: 'JDBC backend for the integration test'
        type: string

jobs:
  start-runner:
    name: JDK${{ inputs.java-version }}-${{ inputs.test-mode }}-${{ inputs.jdbc-backend }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLATFORM: ${{ inputs.architecture }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Check required command
        run: |
          dev/ci/check_commands.sh

      - name: Package Gravitino
        if: ${{ inputs.test-mode == 'deploy' }}
        run: |
          ./gradlew compileDistribution -PskipWeb=true -x test

      - name: Free up disk space
        run: |
          dev/ci/util_free_space.sh

      - name: Authorization Integration Test
        id: integrationTest
        run: |
          ./gradlew -PtestMode=${{ inputs.test-mode }} -PjdbcBackend=${{ inputs.jdbc-backend }} -PskipDockerTests=false -PskipWeb=true :authorizations:test

      - name: Upload integrate tests reports
        uses: actions/upload-artifact@v7
        if: ${{ (failure() && steps.integrationTest.outcome == 'failure') || contains(github.event.pull_request.labels.*.name, 'upload log') }}
        with:
          name: authorizations-integrate-test-reports-${{ inputs.java-version }}-${{ inputs.test-mode }}-${{ inputs.jdbc-backend }}
          path: |
            build/reports
            distribution/package/logs/gravitino-server.out
            distribution/package/logs/gravitino-server.log
