name: Cron Integration Test

on:
  schedule: # Runs by default on the default branch
    - cron: '0 19 * * *' # Runs every day at 19:00 PM UTC, equal to 03:00 AM the next day in GMT+8 time zone
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ contains(github.ref, 'main') }}

jobs:
  repo-guard:
    if: ${{ github.repository == 'danhuawang/gravitino' }}
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.guard.outputs.run }}
    steps:
      - id: guard
        run: echo "run=true" >> "$GITHUB_OUTPUT"

  backend-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
        backend: [mysql]
        test-mode: [embedded, deploy]
    uses: ./.github/workflows/backend-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
      backend: ${{ matrix.backend }}
      test-mode: ${{ matrix.test-mode }}
    secrets: inherit

  flink-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
    uses: ./.github/workflows/flink-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
    secrets: inherit

  spark-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/arm64]
        java-version: [17]
        scala-version: ['2.12']
        test-mode: [deploy]
    uses: ./.github/workflows/spark-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
      scala-version: ${{ matrix.scala-version }}
      test-mode: ${{ matrix.test-mode }}
    secrets: inherit

  maintenance-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
    uses: ./.github/workflows/maintenance-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
    secrets: inherit

  access-control-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
        test-mode: [embedded, deploy]
        jdbc-backend: [h2, mysql, postgresql]
        exclude:
          - test-mode: embedded
            jdbc-backend: mysql
          - test-mode: embedded
            jdbc-backend: postgresql
          - test-mode: deploy
            jdbc-backend: h2
    uses: ./.github/workflows/access-control-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
      test-mode: ${{ matrix.test-mode }}
      jdbc-backend: ${{ matrix.jdbc-backend }}
    secrets: inherit

  frontend-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
    uses: ./.github/workflows/frontend-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
    secrets: inherit

  python-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
    uses: ./.github/workflows/python-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
    secrets: inherit

  trino-integration-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
    uses: ./.github/workflows/trino-integration-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
    secrets: inherit

  gvfs-fuse-build-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [linux/amd64]
        java-version: [17]
    uses: ./.github/workflows/gvfs-fuse-build-test-action.yml
    with:
      architecture: ${{ matrix.architecture }}
      java-version: ${{ matrix.java-version }}
    secrets: inherit

  chart-test:
    needs: repo-guard
    if: ${{ needs.repo-guard.outputs.run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17']
    uses: ./.github/workflows/chart-test-action.yml
    with:
      java-version: ${{ matrix.java-version }}
      run-all-charts: true
    secrets: inherit
