name: Gvfs-fuse Build Test Action

# build gvfs-fuse and run integration test
on:
  workflow_call:
    inputs:
      architecture:
        required: true
        description: 'Architecture of the platform'
        type: string
      java-version:
        required: true
        description: 'Java version'
        type: string

jobs:
  start-runner:
    name: JDK${{ inputs.java-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PLATFORM: ${{ inputs.architecture }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Check required command
        run: |
          dev/ci/check_commands.sh

      - name: Build Gvfs-fuse
        run: |
          ./gradlew :clients:filesystem-fuse:build -PenableFuse=true

      - name: Integration test
        id: integrationTest
        run: |
          ./gradlew build -PskipWeb=true -x :clients:client-python:build -x test -x web
          ./gradlew compileDistribution -PskipWeb=true -x :clients:client-python:build -x test -x web
          cd clients/filesystem-fuse
          make test-s3
          make test-fuse-it

      - name: Free up disk space
        run: |
          dev/ci/util_free_space.sh

      - name: Upload tests reports
        uses: actions/upload-artifact@v7
        if: ${{ (failure() && steps.integrationTest.outcome == 'failure') || contains(github.event.pull_request.labels.*.name, 'upload log') }}
        with:
          name: Gvfs-fuse integrate-test-reports-${{ inputs.java-version }}
          path: |
            clients/filesystem-fuse/target/debug/fuse.log
            distribution/package/logs/gravitino-server.out
            distribution/package/logs/gravitino-server.log
