#
# Trino with the Iceberg REST connector pointed at the Gravitino IRC.
#
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog-config
  namespace: ${TRINO_NAMESPACE}
data:
  gravitino_irc.properties: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=${IRC_SERVICE_URL}
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.server-uri=${KEYCLOAK_TOKEN_URI}
    iceberg.rest-catalog.oauth2.credential=${TRINO_OAUTH2_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=${TRINO_OAUTH2_SCOPE}
    iceberg.rest-catalog.oauth2.token-exchange-enabled=false
    iceberg.rest-catalog.vended-credentials-enabled=true
    iceberg.rest-catalog.nested-namespace-enabled=true

  gravitino_irc_s3.properties: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=${IRC_SERVICE_URL}
    iceberg.rest-catalog.prefix=catalog_iceberg_s3
    iceberg.rest-catalog.warehouse=catalog_iceberg_s3
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.server-uri=${KEYCLOAK_TOKEN_URI}
    iceberg.rest-catalog.oauth2.credential=${TRINO_OAUTH2_CREDENTIAL}
    iceberg.rest-catalog.oauth2.scope=${TRINO_OAUTH2_SCOPE}
    iceberg.rest-catalog.oauth2.token-exchange-enabled=false
    iceberg.rest-catalog.vended-credentials-enabled=true
    iceberg.rest-catalog.nested-namespace-enabled=true
    fs.native-s3.enabled=true
    s3.region=us-east-1

  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    discovery.uri=http://localhost:8080
    internal-communication.shared-secret=irc-e2e-internal-secret

  jvm.config: |
    -server
    -Xmx2G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError
    -Djdk.attach.allowAttachSelf=true
    -Djdk.nio.maxCachedBufferSize=2000000

  node.properties: |
    node.environment=test
    node.id=trino-e2e-node-1
    node.data-dir=/data/trino

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: ${TRINO_NAMESPACE}
  labels:
    app: trino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
  template:
    metadata:
      labels:
        app: trino
    spec:
      containers:
        - name: trino
          image: trinodb/trino:480
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: catalog-config
              mountPath: /etc/trino/catalog/gravitino_irc.properties
              subPath: gravitino_irc.properties
            - name: catalog-config
              mountPath: /etc/trino/catalog/gravitino_irc_s3.properties
              subPath: gravitino_irc_s3.properties              
            - name: catalog-config
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: catalog-config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: catalog-config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /v1/info
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/info
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: catalog-config
          configMap:
            name: trino-catalog-config
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: ${TRINO_NAMESPACE}
spec:
  type: NodePort
  selector:
    app: trino
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880
      name: http
