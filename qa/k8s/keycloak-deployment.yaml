#
# Keycloak (v26.0.7) deployment for Env 2 oauth2-auth e2e tests.
#
# The image `datastratosandbox/baseimage:keycloak-v26.0.7` ships a pre-seeded
# realm `myrealm` with `postman-client` and the test users (alice, eve)
# described in qa/gravitino-service-e2e-test/GROUP_BASED_AC_TEST_PLAN.md.
#
# Exposes Keycloak on NodePort 30080 (container 8080), so the host can reach
# it as http://localhost:30080 and the in-cluster DNS name is
# `keycloak.<namespace>.svc.cluster.local:8080`.
#
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ${NAMESPACE}
  labels:
    app: keycloak
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ${NAMESPACE}
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: datastratosandbox/baseimage:keycloak-v26.0.7
          args:
            - "start-dev"
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: "${KEYCLOAK_ADMIN_PASSWORD}"
            - name: KC_FEATURES
              value: "token-exchange"
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
